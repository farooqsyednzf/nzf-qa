[build]
  publish   = "."
  functions = "netlify/functions"
  command   = "npm install"

[functions]
  node_bundler = "esbuild"

[functions."qa"]
  timeout = 20

[functions."ticket"]
  timeout = 15

# Route /api/* to matching Netlify function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# ── Security headers on all responses ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent this page being embedded in iframes on other domains
    X-Frame-Options = "SAMEORIGIN"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Limit referrer data sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Basic permissions policy
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content Security Policy
    # - default-src 'self': only load resources from same origin by default
    # - script-src 'self' 'unsafe-inline': inline scripts needed (no bundler)
    # - style-src 'self' 'unsafe-inline' fonts.googleapis.com: inline CSS + Google Fonts
    # - font-src fonts.gstatic.com: Google Fonts files
    # - connect-src 'self': fetch() only to same origin (API calls go to /api/*)
    # - img-src 'self' data:: allow inline SVG/data URIs
    # - frame-ancestors 'self': matches X-Frame-Options above
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'self';"

# Cache static assets aggressively (none currently, but good to have)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
