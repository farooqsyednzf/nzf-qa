[build]
  publish   = "."
  functions = "netlify/functions"
  command   = "npm install"

[functions]
  node_bundler = "esbuild"

[functions."qa"]
  timeout = 20

[functions."ticket"]
  timeout = 15

# Route /api/* calls to the matching Netlify function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
