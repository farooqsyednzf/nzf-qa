[build]
  publish   = "."
  functions = "netlify/functions"
  command   = "npm install"
[functions]
  node_bundler = "esbuild"
[functions."qa"]
  timeout = 20
[functions."ticket"]
  timeout = 15
[functions."log"]
  timeout = 10
# Route /api/* to matching Netlify function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
# ── Security headers on all responses ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'self' https://www.nzf.org.au https://nzf.org.au;"
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
